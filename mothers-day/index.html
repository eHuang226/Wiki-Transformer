<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A blooming garden Mother's Day message" />
  <title>Happy Mother's Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/garden.css" />
  <link rel="stylesheet" href="css/background.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/creatures.css" />
</head>
<body>
  <div class="garden" id="garden">
    <div class="sky" aria-hidden="true">
      <div class="sky-glow"></div>

      <div class="bg-scenery">
        <div class="bg-sun"></div>
        <div class="bg-cloud bg-cloud--1"></div>
        <div class="bg-cloud bg-cloud--2"></div>
        <div class="bg-cloud bg-cloud--3"></div>
        <div class="bg-cloud bg-cloud--4"></div>
        <svg class="bg-landscape" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8b8b0"/>
              <stop offset="25%" stop-color="#a8c4a0"/>
              <stop offset="100%" stop-color="#6d9468"/>
            </linearGradient>
            <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#8fbf8a"/>
              <stop offset="100%" stop-color="#5a9e55"/>
            </linearGradient>
            <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#7cb87c"/>
              <stop offset="100%" stop-color="#5a9e5a"/>
            </linearGradient>
            <linearGradient id="treeFar" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#4a7350"/>
              <stop offset="100%" stop-color="#2d4a32"/>
            </linearGradient>
            <linearGradient id="treeMid" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#3d6640"/>
              <stop offset="100%" stop-color="#254428"/>
            </linearGradient>
          </defs>

          <!-- Ridge guides (invisible — used to anchor trees) -->
          <path id="ridge-far" fill="none" stroke="none" d="
            M 0 218
            C 160 172 320 158 480 164
            C 640 152 800 162 960 154
            C 1120 146 1280 152 1440 144"/>
          <path id="ridge-mid" fill="none" stroke="none" d="
            M 0 258
            C 240 224 480 230 720 222
            C 960 216 1200 226 1440 234"/>

          <!-- Distant rolling hills -->
          <path fill="url(#hillFar)" d="
            M 0 360 L 0 218
            C 160 172 320 158 480 164
            C 640 152 800 162 960 154
            C 1120 146 1280 152 1440 144
            L 1440 360 Z"/>

          <!-- Far trees — positioned by landscape.js -->
          <g fill="url(#treeFar)" id="trees-far">
            <g class="ridge-tree" data-ridge="far" data-x="120" data-scale="1">
              <rect x="-2" y="0" width="4" height="32" fill="#2d4a32"/>
              <circle cx="0" cy="-14" r="16"/>
              <circle cx="-10" cy="-10" r="12" opacity="0.9"/>
              <circle cx="10" cy="-10" r="12" opacity="0.9"/>
              <circle cx="0" cy="-22" r="10"/>
            </g>
            <g class="ridge-tree" data-ridge="far" data-x="400" data-scale="0.85">
              <rect x="-1.5" y="0" width="3" height="26" fill="#2d4a32"/>
              <circle cx="0" cy="-12" r="13"/>
              <circle cx="-8" cy="-8" r="9" opacity="0.85"/>
              <circle cx="8" cy="-8" r="9" opacity="0.85"/>
            </g>
            <g class="ridge-tree" data-ridge="far" data-x="830" data-scale="0.8">
              <rect x="-1.5" y="0" width="3" height="22" fill="#2d4a32"/>
              <circle cx="0" cy="-10" r="11"/>
              <circle cx="-7" cy="-7" r="8" opacity="0.85"/>
              <circle cx="7" cy="-7" r="8" opacity="0.85"/>
            </g>
            <g class="ridge-tree" data-ridge="far" data-x="1240" data-scale="0.95">
              <rect x="-2" y="0" width="4" height="30" fill="#2d4a32"/>
              <circle cx="0" cy="-13" r="15"/>
              <circle cx="-9" cy="-9" r="11" opacity="0.9"/>
              <circle cx="9" cy="-9" r="11" opacity="0.9"/>
              <circle cx="0" cy="-20" r="9"/>
            </g>
          </g>

          <!-- Middle hills -->
          <path fill="url(#hillMid)" d="
            M 0 360 L 0 258
            C 240 224 480 230 720 222
            C 960 216 1200 226 1440 234
            L 1440 360 Z"/>

          <!-- Mid trees -->
          <g fill="url(#treeMid)" id="trees-mid">
            <g class="ridge-tree" data-ridge="mid" data-x="320" data-scale="1.1">
              <rect x="-2.5" y="0" width="5" height="36" fill="#254428"/>
              <circle cx="0" cy="-16" r="18"/>
              <circle cx="-12" cy="-12" r="14" opacity="0.9"/>
              <circle cx="12" cy="-12" r="14" opacity="0.9"/>
              <circle cx="0" cy="-26" r="12"/>
            </g>
            <g class="ridge-tree" data-ridge="mid" data-x="1040" data-scale="1.05">
              <rect x="-2.5" y="0" width="5" height="34" fill="#254428"/>
              <circle cx="0" cy="-15" r="17"/>
              <circle cx="-11" cy="-11" r="13" opacity="0.9"/>
              <circle cx="11" cy="-11" r="13" opacity="0.9"/>
              <circle cx="0" cy="-24" r="11"/>
            </g>
          </g>

          <!-- Near slope — matches meadow -->
          <path fill="url(#hillNear)" d="
            M 0 360 L 0 292
            Q 360 278 720 282
            Q 1080 276 1440 286
            L 1440 360 Z"/>
        </svg>
      </div>

      <div id="bg-mid-flowers" class="bg-mid-flowers"></div>
      <div id="petal-layer" class="petal-layer"></div>
      <div id="sky-creatures" class="sky-creatures"></div>
    </div>

    <main class="content">
      <header class="content-header">
        <h1 class="headline" id="headline"></h1>
        <p class="greeting" id="greeting"></p>
      </header>

      <article class="message-card" id="message-card" aria-live="polite">
        <p class="message" id="message"></p>
      </article>

      <ul class="bouquet" id="bouquet" aria-label="Reasons I love you"></ul>

      <footer class="signature-block">
        <p class="signature" id="signature"></p>
        <p class="your-name" id="your-name"></p>
      </footer>
    </main>

    <div class="meadow" aria-hidden="true">
      <svg class="meadow-bush meadow-bush--left" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 55 Q30 20 55 30 Q75 15 90 40 Q95 55 70 58 Q40 62 10 55 Z" fill="#5a9e5a" stroke="#4a8f4a" stroke-width="1"/>
        <circle cx="35" cy="38" r="4" fill="#ffb3c6" stroke="#d4788f" stroke-width="0.6"/>
        <circle cx="58" cy="35" r="3" fill="#ffc8dd" stroke="#d492a8" stroke-width="0.6"/>
      </svg>
      <svg class="meadow-bush meadow-bush--right" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
        <path d="M90 55 Q70 22 45 32 Q25 18 10 42 Q8 54 32 57 Q62 60 90 55 Z" fill="#5a9e5a" stroke="#4a8f4a" stroke-width="1"/>
        <circle cx="48" cy="36" r="3.5" fill="#c9b1ff" stroke="#9a82c8" stroke-width="0.6"/>
        <circle cx="68" cy="40" r="3" fill="#ffafcc" stroke="#c97a90" stroke-width="0.6"/>
      </svg>
      <div class="grass"></div>
      <div id="meadow-back" class="meadow-back"></div>
      <div id="meadow-tufts" class="meadow-tufts"></div>
      <div class="flowers"></div>
    </div>
  </div>

  <button type="button" id="audio-toggle" class="audio-toggle hidden" aria-label="Play garden sounds" title="Garden sounds">
    <svg class="audio-icon audio-icon--off" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
    </svg>
    <svg class="audio-icon audio-icon--on" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6zm-2 14.5A6.5 6.5 0 0 1 5.5 11H3v2h2.5A4.5 4.5 0 0 0 12 17.5V20a8 8 0 0 1-8-8h2a6 6 0 0 0 6 6v-2.5z"/>
    </svg>
  </button>

  <script type="module" src="js/garden.js"></script>
</body>
</html>
